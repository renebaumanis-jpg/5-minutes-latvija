<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaunākais izdevums — 5 Minūtes Latvijā</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper:   #fbf9f3;
    --bg:      #e8e4da;
    --ink:     #1a1a1a;
    --soft:    #3a3a3a;
    --muted:   #888;
    --rule:    #d0ccc0;
    --red:     #9e1c20;
    --serif:   'Playfair Display', Georgia, 'Times New Roman', serif;
    --sans:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 56px 20px;
  }

  .paper {
    width: 100%;
    max-width: 640px;
    background: var(--paper);
    box-shadow: 0 2px 40px rgba(0,0,0,0.07);
  }

  .rule-red { height: 2px; background: var(--red); width: 100%; }
  .rule-black-thin { height: 1px; background: var(--ink); width: 100%; }
  .rule-black-thick { height: 2px; background: var(--ink); width: 100%; }

  .masthead {
    padding: 52px 60px 44px;
    text-align: center;
  }

  .masthead-date {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin: 20px 0;
  }

  h1 {
    font-family: var(--serif);
    font-size: clamp(48px, 10vw, 68px);
    font-weight: 800;
    line-height: 0.92;
    letter-spacing: -2.5px;
    margin: 22px 0;
  }

  h1 .red { color: var(--red); }
  h1 .ink { color: var(--ink); }

  .pub-line {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 0;
  }

  .body {
    padding: 40px 60px 56px;
  }

  /* Newsletter content styles */
  .content h2 {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--red);
    margin: 40px 0 20px;
    padding-top: 20px;
    border-top: 2px solid var(--ink);
  }

  .content h3 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    letter-spacing: -0.5px;
    margin: 32px 0 14px;
  }

  .content p {
    font-family: var(--serif);
    font-size: 15.5px;
    line-height: 1.78;
    color: var(--soft);
    margin-bottom: 14px;
  }

  .content strong {
    color: var(--ink);
    font-weight: 700;
  }

  .content em {
    font-style: italic;
  }

  .content hr {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 32px 0;
  }

  .content ul {
    list-style: none;
    margin: 16px 0;
  }

  .content ul li {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.6;
    color: var(--soft);
    padding: 10px 0 10px 24px;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }

  .content ul li::before {
    content: '—';
    color: var(--red);
    position: absolute;
    left: 0;
  }

  .content blockquote {
    border-left: 2px solid var(--red);
    padding-left: 20px;
    margin: 20px 0;
    font-style: italic;
    color: var(--soft);
  }

  /* ŠONEDĒĻ special styling */
  .sonedel {
    font-family: var(--serif);
    font-size: 20px;
    line-height: 1.5;
    color: var(--ink);
    font-style: italic;
    padding: 24px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-bottom: 32px;
  }

  .cta-box {
    background: var(--ink);
    padding: 32px 40px;
    margin: 48px 0 0;
    text-align: center;
  }

  .cta-box p {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .cta-box a {
    display: inline-block;
    background: var(--red);
    color: var(--paper);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    text-decoration: none;
    padding: 14px 32px;
  }

  .cta-box a:hover { background: #7d1519; }

  .footer {
    background: var(--ink);
    padding: 28px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-brand {
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 700;
    color: var(--paper);
    letter-spacing: -0.3px;
  }

  .footer-brand span { color: var(--red); }

  .footer-meta {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
  }

  @media (max-width: 520px) {
    .masthead, .body, .footer { padding-left: 28px; padding-right: 28px; }
    .cta-box { padding: 24px 28px; }
    .footer { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="paper">

  <div class="rule-red"></div>

  <div class="masthead">
    <div class="rule-black-thin"></div>
    <span class="masthead-date">Jaunākais izdevums</span>
    <span class="masthead-date" style="margin-top:-10px;"><span id="coverage-dates"></span></span>
    <div class="rule-black-thin"></div>
    <h1>
      <span class="red">5 Minūtes</span><br>
      <span class="ink">Latvijā</span>
    </h1>
    <div class="rule-black-thick"></div>
    <p class="pub-line">Par ko Latvija runāja šonedēļ</p>
  </div>

  <div class="body">
    <!-- Phone preview -->
    <div id="issue-preview" style="display:none;border:1.5px solid #1a1a1a;padding:24px 28px;margin-bottom:32px;">
      <span style="font-family:'Inter',-apple-system,sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#9e1c20;display:block;margin-bottom:14px;">Šonedēļ</span>
      <p id="preview-thesis" style="font-family:'Playfair Display',Georgia,serif;font-size:17px;font-weight:700;color:#1a1a1a;line-height:1.35;margin-bottom:16px;letter-spacing:-0.3px;"></p>
      <div id="preview-bullets" style="border-top:1px solid #d0ccc0;padding-top:14px;"></div>
      <a href="#newsletter-content" style="font-family:'Inter',-apple-system,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#9e1c20;text-decoration:none;display:block;margin-top:16px;padding-top:14px;border-top:1px solid #d0ccc0;">Lasīt pilnu izdevumu ↓</a>
    </div>

    <div class="content" id="newsletter-content">
      <!-- Content rendered by JS from markdown -->
    </div>

    <!-- Share section -->
    <div style="margin-top:32px;padding-top:24px;border-top:1px solid #d0ccc0;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
      <span style="font-family:'Inter',-apple-system,sans-serif;font-size:11px;color:#888;">Kopīgo:</span>

      <button id="native-share" onclick="nativeShare()" style="display:none;background:none;border:none;font-family:'Inter',-apple-system,sans-serif;font-size:11px;color:#9e1c20;font-weight:600;cursor:pointer;padding:0;text-decoration:underline;">
        Kopīgot →
      </button>

      <button id="copy-btn" onclick="copyLink()" style="background:none;border:none;font-family:'Inter',-apple-system,sans-serif;font-size:11px;color:#9e1c20;font-weight:600;cursor:pointer;padding:0;text-decoration:underline;">
        Kopēt saiti
      </button>

      <span id="copy-confirm" style="font-family:Georgia,serif;font-size:11px;font-style:italic;color:#888;display:none;">Nokopēts.</span>
    </div>

    <!-- Previous issues -->
    <div id="previous-issues-section" style="display:none;padding:40px 0 0;border-top:1px solid #d0ccc0;margin-top:48px;">
      <span style="font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#9e1c20;display:block;margin-bottom:24px;">Iepriekšējie izdevumi</span>
      <div id="previous-issues-row" style="display:flex;gap:20px;overflow-x:auto;padding-bottom:16px;"></div>
    </div>

    <!-- CTA after reading -->
    <div style="border-top:2px solid #1a1a1a;margin-top:40px;padding-top:36px;text-align:center;">
      <h2 style="font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:800;color:#1a1a1a;letter-spacing:-0.5px;margin-bottom:12px;line-height:1.2;">Saņem nākamo izdevumu.</h2>
      <a href="/" style="display:inline-block;background:#9e1c20;color:#fbf9f3;font-family:'Inter',-apple-system,sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;text-decoration:none;padding:16px 40px;transition:background 0.18s;"
         onmouseover="this.style.background='#7d1519'" onmouseout="this.style.background='#9e1c20'">
        Pierakstīties
      </a>
      <p style="font-family:Georgia,serif;font-size:13px;font-style:italic;color:#888;margin-top:16px;">Pierakstīšanās aizņem 10 sekundes.</p>
    </div>

  </div>

  <div class="footer">
    <span class="footer-brand"><span>5 Minūtes</span> Latvijā</span>
    <span class="footer-meta">Otrdienās · 10:00 · ~5 min</span>
  </div>

</div>

<script>
// Simple markdown renderer for the newsletter format
async function loadNewsletter() {
  try {
    const res = await fetch('/drafts/draft_latest.md');
    const md = await res.text();
    document.getElementById('newsletter-content').innerHTML = renderMD(md);
    buildPreview(md);
  } catch(e) {
    document.getElementById('newsletter-content').innerHTML = '<p style="color:#888;font-style:italic;">Izdevums tiek sagatavots. Atgriezies otrdienā plkst. 10:00.</p>';
  }
}

function buildPreview(md) {
  const lines = md.split('\n');
  let thesis = '';
  let headlines = [];
  let inSonedel = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();

    // Get ŠONEDĒĻ thesis
    if (line === '## ŠONEDĒĻ') { inSonedel = true; continue; }
    if (inSonedel && line && !line.startsWith('#') && line !== '---') {
      thesis = line; inSonedel = false; continue;
    }

    // Get story headlines (h3)
    if (line.startsWith('### ')) {
      headlines.push(line.replace('### ', '').trim());
    }
  }

  if (!thesis && headlines.length === 0) return;

  // Populate preview
  document.getElementById('preview-thesis').textContent = thesis;
  
  const bulletsEl = document.getElementById('preview-bullets');
  bulletsEl.innerHTML = headlines.slice(0, 4).map(h =>
    `<p style="font-family:Georgia,serif;font-size:13px;color:#3a3a3a;line-height:1.5;padding:7px 0;border-bottom:1px solid #e8e4da;margin:0;">
      <span style="color:#9e1c20;font-weight:700;margin-right:8px;">—</span>${h}
    </p>`
  ).join('');

  document.getElementById('issue-preview').style.display = 'block';
}

function renderMD(md) {
  let html = '';
  const lines = md.split('\n');
  let i = 0;
  let inList = false;

  while (i < lines.length) {
    const line = lines[i];

    // Skip h1 (newsletter title)
    if (line.startsWith('# ')) { i++; continue; }

    // Skip italic tagline
    if (line.startsWith('*Par ko') && line.endsWith('*')) { i++; continue; }

    // H2 section headers
    if (line.startsWith('## ')) {
      if (inList) { html += '</ul>'; inList = false; }
      const text = line.replace('## ', '');
      if (text === 'ŠONEDĒĻ') {
        // Skip — already shown in preview box above
        i++;
        while (i < lines.length && lines[i].trim() === '') i++;
        while (i < lines.length && lines[i].trim() !== '' && !lines[i].startsWith('#') && !lines[i].startsWith('---')) {
          i++;
        }
        continue;
      }
      html += `<h2>${text}</h2>`;
      i++; continue;
    }

    // H3 story headlines
    if (line.startsWith('### ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h3>${line.replace('### ', '')}</h3>`;
      i++; continue;
    }

    // HR dividers
    if (line.trim() === '---') {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<hr>';
      i++; continue;
    }

    // Bullet points
    if (line.startsWith('• ') || line.startsWith('- ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${formatInline(line.replace(/^[•\-] /, ''))}</li>`;
      i++; continue;
    }

    // Empty lines
    if (line.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; }
      i++; continue;
    }

    // Regular paragraphs
    if (inList) { html += '</ul>'; inList = false; }
    if (line.trim()) {
      html += `<p>${formatInline(line)}</p>`;
    }
    i++;
  }

  if (inList) html += '</ul>';
  return html;
}

function formatInline(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" style="color:#9e1c20;">$1</a>');
}

// Share functionality
const shareUrl = 'https://piecasminutes.lv/izdevums.html';
const shareText = 'Ko vajadzēja zināt par Latviju šonedēļ.';

function getCoverageDates() {
  // Calculate previous Mon-Sun from today
  const today = new Date();
  const day = today.getDay(); // 0=Sun, 1=Mon...
  const daysToLastSun = day === 0 ? 7 : day;
  const lastSun = new Date(today);
  lastSun.setDate(today.getDate() - daysToLastSun);
  const lastMon = new Date(lastSun);
  lastMon.setDate(lastSun.getDate() - 6);

  const months = ['janv.','febr.','marts','apr.','maijs','jūn.','jūl.','aug.','sept.','okt.','nov.','dec.'];
  const fmtShort = d => `${d.getDate()}. ${months[d.getMonth()]}`;
  return `${fmtShort(lastMon)} – ${fmtShort(lastSun)} ${lastSun.getFullYear()}`;
}

document.getElementById('coverage-dates').textContent = getCoverageDates();

// Show native share button on mobile
if (navigator.share) {
  document.getElementById('native-share').style.display = 'inline-block';
}

function nativeShare() {
  navigator.share({
    title: '5 Minūtes Latvijā',
    text: shareText,
    url: shareUrl
  }).catch(() => {});
}

function copyLink() {
  navigator.clipboard.writeText(shareUrl).then(() => {
    const btn = document.getElementById('copy-btn');
    const confirm = document.getElementById('copy-confirm');
    btn.textContent = '✓ Nokopēts';
    confirm.style.display = 'block';
    setTimeout(() => {
      btn.textContent = 'Kopēt saiti';
      confirm.style.display = 'none';
    }, 2500);
  }).catch(() => {
    // Fallback for older browsers
    const el = document.createElement('textarea');
    el.value = shareUrl;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    document.getElementById('copy-btn').textContent = '✓ Nokopēts';
    document.getElementById('copy-confirm').style.display = 'block';
    setTimeout(() => {
      document.getElementById('copy-btn').textContent = 'Kopēt saiti';
      document.getElementById('copy-confirm').style.display = 'none';
    }, 2500);
  });
}

loadNewsletter();
loadPreviousIssues();

async function loadPreviousIssues() {
  const today = new Date();
  const issues = [];

  // Check last 8 Tuesdays
  for (let i = 1; i <= 8; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - (i * 7));
    // Find nearest Tuesday
    const day = d.getDay();
    const diff = day <= 2 ? -(day - 2) : -(day - 2);
    d.setDate(d.getDate() + diff);
    const dateStr = d.toISOString().split('T')[0];
    issues.push(dateStr);
  }

  const found = [];
  for (const dateStr of issues) {
    try {
      const res = await fetch(`/drafts/draft_${dateStr}.md`);
      if (res.ok) {
        const md = await res.text();
        found.push({ dateStr, md });
      }
    } catch(e) {}
  }

  if (found.length === 0) return;

  document.getElementById('previous-issues-section').style.display = 'block';
  const row = document.getElementById('previous-issues-row');

  found.forEach(({ dateStr, md }) => {
    const lines = md.split('\n');
    let thesis = '', inSonedel = false;
    for (const line of lines) {
      const t = line.trim();
      if (t === '## ŠONEDĒĻ') { inSonedel = true; continue; }
      if (inSonedel && t && !t.startsWith('#') && t !== '---') { thesis = t.replace(/\*\*/g, ''); break; }
    }

    const d = new Date(dateStr);
    const months = ['janv.','febr.','marts','apr.','maijs','jūn.','jūl.','aug.','sept.','okt.','nov.','dec.'];
    const label = d.getDate() + '. ' + months[d.getMonth()];

    const card = document.createElement('a');
    card.href = '#';
    card.style.cssText = 'text-decoration:none;flex-shrink:0;width:140px;cursor:pointer;';
    card.onclick = (e) => {
      e.preventDefault();
      document.getElementById('newsletter-content').innerHTML = renderMD(md);
      window.scrollTo({top: 0, behavior: 'smooth'});
    };

    card.innerHTML = `
      <div style="background:#faf8f2;border:1px solid #ccc9be;transform:rotate(-1.5deg);box-shadow:2px 3px 0 rgba(0,0,0,0.05);transition:transform 0.2s ease,box-shadow 0.2s ease;"
        onmouseover="this.style.transform='rotate(0deg) translateY(-2px)';this.style.boxShadow='3px 5px 0 rgba(0,0,0,0.08)';"
        onmouseout="this.style.transform='rotate(-1.5deg)';this.style.boxShadow='2px 3px 0 rgba(0,0,0,0.05)';">
        <div style="height:2px;background:#9e1c20;"></div>
        <div style="padding:8px 9px 10px;">
          <div style="font-family:'Playfair Display',Georgia,serif;font-size:10px;font-weight:800;color:#1a1a1a;text-align:center;line-height:1;margin-bottom:2px;"><span style="color:#9e1c20;">5 Min.</span> Latvijā</div>
          <div style="height:1px;background:#1a1a1a;margin-bottom:6px;"></div>
          <div style="font-family:'Inter',sans-serif;font-size:5px;color:#aaa;text-align:center;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">${label}</div>
          <div style="font-family:'Playfair Display',Georgia,serif;font-size:7px;font-weight:700;color:#1a1a1a;line-height:1.3;">${thesis.length > 60 ? thesis.slice(0,60)+'…' : thesis}</div>
        </div>
      </div>
      <span style="font-family:'Inter',sans-serif;font-size:8px;color:#aaa;display:block;text-align:center;margin-top:6px;letter-spacing:1px;">${label}</span>
    `;
    row.appendChild(card);
  });
}
</script>

</body>
</html>
